name: CI

on:
  pull_request:
    branches:
      - "*"
  push:
    branches:
      - main
      - natural
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────
  # Job 1 · Tests (native Go, fast)
  # ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          # setup-go caches the module + build cache itself; a separate
          # actions/cache over the same paths makes tar fail to extract over
          # already-restored files ("Cannot open: File exists").

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          file: coverage.out
          fail_ci_if_error: false

  # ────────────────────────────────────────────────────────────────
  # Job 2 · Lint
  # ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

  # ────────────────────────────────────────────────────────────────
  # Job 3 · Vulnerability scan
  # ────────────────────────────────────────────────────────────────
  vuln:
    name: Vuln Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # ────────────────────────────────────────────────────────────────
  # Job 4 · Docker container build (depends on test + lint passing)
  # ────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # needed for git describe

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Verify modules
        run: make verify

      - name: Build runtime base (local, not pushed)
        run: |
          make base-build-local DOCKER_CACHE_ARGS="--cache-from=type=gha,scope=base --cache-to=type=gha,mode=max,scope=base"

      - name: Build container
        run: |
          make docker-build DOCKER_CACHE_ARGS="--cache-from=type=gha,scope=app --cache-to=type=gha,mode=max,scope=app"
