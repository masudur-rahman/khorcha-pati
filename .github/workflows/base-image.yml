name: Base Image

# Builds and pushes the prebuilt runtime base images (heavy fonts / wkhtmltopdf /
# chromium layers). Runs weekly so security patches (apt upgrade) keep flowing,
# and whenever the base definition changes. The per-tag Release build consumes
# these, so it only has to compile Go.
on:
    schedule:
        - cron: "0 3 * * 1" # Mondays 03:00 UTC
    push:
        paths:
            - "Dockerfile.base"
            - ".github/workflows/base-image.yml"
    workflow_dispatch:

concurrency:
    group: base-image
    cancel-in-progress: false

jobs:
    base:
        name: Build Runtime Base
        runs-on: ubuntu-latest
        steps:
            - name: Check out code
              uses: actions/checkout@v6

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Expose GitHub Actions cache to buildx
              uses: crazy-max/ghaction-github-runtime@v3

            - name: Build & push base to GitHub Container Registry
              env:
                  REGISTRY: ghcr.io/masudur-rahman
                  DOCKER_TOKEN: ${{ secrets.GH_TOKEN }}
                  USERNAME: masudur-rahman
                  DOCKER_CACHE_ARGS: --cache-from type=gha --cache-to type=gha,mode=max
              run: |
                  docker login ghcr.io --username ${USERNAME} --password ${DOCKER_TOKEN}
                  make base-build-push

            - name: Build & push base to Docker Container Registry
              env:
                  REGISTRY: masudjuly02
                  DOCKER_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
                  USERNAME: masudjuly02
                  DOCKER_CACHE_ARGS: --cache-from type=gha --cache-to type=gha,mode=max
              run: |
                  docker login --username ${USERNAME} --password ${DOCKER_TOKEN}
                  make base-build-push
