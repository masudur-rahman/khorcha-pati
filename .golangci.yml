# golangci-lint configuration (v2)
# Docs: https://golangci-lint.run/usage/configuration/
version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - gosec
    - misspell
  disable:
    - depguard
    - bodyclose
    - noctx
    - nilerr
    - errorlint

formatters:
  enable:
    - gofmt

linters-settings:
  errcheck:
    check-type-assertions: false
    check-blank: false
  govet:
    disable:
      - fieldalignment
      - shadow
  staticcheck:
    checks: ["all"]
  misspell:
    locale: US
  gosec:
    excludes:
      - G107
      - G114
      - G304
      - G306

run:
  timeout: 5m

issues:
  exclude-dirs:
    - vendor
    - hack
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
