# golangci-lint configuration
# Docs: https://golangci-lint.run/usage/configuration/

linters-settings:
  errcheck:
    check-type-assertions: false
    check-blank: false
  govet:
    disable:
      - fieldalignment
      - shadow
  staticcheck:
    checks: ["all"]
  misspell:
    locale: US
  gosec:
    excludes:
      - G107  # potential HTTP request with variable url
      - G114  # http serve without timeouts
      - G304  # file path from variable
      - G306  # writeFile permissions

linters:
  enable:
    - errcheck
    - govet
    - gosimple
    - staticcheck
    - ineffassign
    - unused
    - gofmt
    - gosec
    - misspell

  disable:
    - depguard
    - bodyclose
    - noctx
    - contextcheck
    - nilerr
    - errorlint

run:
  timeout: 5m

issues:
  exclude-dirs:
    - vendor
    - hack
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
